worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Logging ─────────────────────────────────────────────────────────────
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # Ocultar versión de nginx
  server_tokens off;

  # Límites de request
  client_max_body_size 2m;

  # Rate limit para rutas de autenticación
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

  # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS principal ────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    # IMPORTANTE: Reemplazar con tu dominio real
    server_name stc-cloud.tu-dominio.com;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/stc-cloud.tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stc-cloud.tu-dominio.com/privkey.pem;

    # Protocolos y cifrado
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # SSL session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─── Security headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self'" always;

    # ─── Portal web (frontend React) ─────────────────────────────────────
    location / {
      proxy_pass         http://portal:80;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── API REST ────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Auth routes — strict rate limit ─────────────────────────────────
    location ~ ^/api/v1/(portal/login|agents/activate) {
      limit_req zone=auth_zone burst=5 nodelay;

      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket hub ───────────────────────────────────────────────────
    location /ws {
      proxy_pass             http://api:3000;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade    $http_upgrade;
      proxy_set_header       Connection "upgrade";
      proxy_set_header       Host       $host;
      proxy_read_timeout     86400;
    }
  }
}
