name: Deploy

# Runs automatically after CI passes on main, or manually via workflow_dispatch.
#
# Required GitHub secrets:
#   VERCEL_TOKEN        → Vercel dashboard → Account Settings → Tokens
#   VERCEL_ORG_ID       → run `vercel link` locally, copy from .vercel/project.json
#   VERCEL_PROJECT_ID   → same file as above
#   RENDER_DEPLOY_HOOK_URL → Render dashboard → stc-cloud-api → Settings → Deploy Hooks
#
# IMPORTANT: disable Vercel's GitHub auto-deploy integration and Render's
# auto-deploy to avoid double deployments (Settings → Auto-Deploy: No in Render,
# and remove the GitHub integration in the Vercel project settings).

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Portal → Vercel ───────────────────────────────────────────────────────
  portal:
    name: Deploy Portal → Vercel
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ─── API → Render ─────────────────────────────────────────────────────────
  api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger Render deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render responded with HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "201" ]] || exit 1
